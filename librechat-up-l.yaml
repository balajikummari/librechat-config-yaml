version: 1.2.4
cache: true

interface:
  customWelcome: |
    Welcome to Scale.jobs AI.

    Use this workspace for recruiting, operations, writing, research, and internal workflows.
    Please verify important outputs before acting on them.

  privacyPolicy:
    externalUrl: "https://scale.jobs/privacy"
    openNewTab: true

  termsOfService:
    externalUrl: "https://scale.jobs/terms"
    openNewTab: true

registration:
  allowedDomains:
    - "scale.jobs"
  socialLogins: []

modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "default-gemini-flash"
      label: "Google · Gemini 2.5 Flash"
      default: true
      description: "Default model for everyday team use."
      preset:
        endpoint: "google"
        model: "gemini-2.5-flash"
        modelLabel: "Gemini 2.5 Flash"

    - name: "gemini-pro"
      label: "Google · Gemini 2.5 Pro"
      description: "For heavier reasoning and larger-context work."
      preset:
        endpoint: "google"
        model: "gemini-2.5-pro"
        modelLabel: "Gemini 2.5 Pro"

    - name: "openai-gpt5"
      label: "OpenAI · GPT-5"
      description: "Best for premium writing and complex tasks."
      preset:
        endpoint: "openAI"
        model: "gpt-5"
        modelLabel: "GPT-5"

    - name: "openai-gpt5-mini"
      label: "OpenAI · GPT-5 Mini"
      description: "Fast OpenAI option."
      preset:
        endpoint: "openAI"
        model: "gpt-5-mini"
        modelLabel: "GPT-5 Mini"

    - name: "openai-o3"
      label: "OpenAI · o3"
      description: "Reasoning-heavy tasks."
      preset:
        endpoint: "openAI"
        model: "o3"
        modelLabel: "o3"

    - name: "claude-sonnet"
      label: "Anthropic · Claude Sonnet 4"
      description: "Great for writing, analysis, and review."
      preset:
        endpoint: "anthropic"
        model: "claude-sonnet-4-20250514"
        modelLabel: "Claude Sonnet 4"

    - name: "claude-opus"
      label: "Anthropic · Claude Opus 4.1"
      description: "Best Anthropic option for difficult work."
      preset:
        endpoint: "anthropic"
        model: "claude-opus-4-1-20250805"
        modelLabel: "Claude Opus 4.1"
